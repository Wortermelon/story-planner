<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Story Planner</title>
<!-- installable web app (iPad: Share -> Add to Home Screen) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b4fbb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Story Planner">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
  html,body{margin:0;height:100vh;height:100dvh;background:#f4f3ee}
  iframe{border:0;width:100%;height:100vh;height:100dvh;display:block}
</style>
</head>
<body>
<iframe id="app" allow="clipboard-write; clipboard-read"></iframe>
<script>
  // The published Story Planner web-app URL.
  var EXEC = "https://script.google.com/macros/s/AKfycbxElSPttQJUhM_XV0qLJWrJslVdesl6QhkNHCp2XemUTQnuuME-K49zwB6s_IJriN-D/exec";
  function srcFor(page){
    return EXEC + "?embed=1" + (page && page !== "planner" ? "&page=" + encodeURIComponent(page) : "");
  }
  // open the page named in this wrapper's own ?page= (defaults to the planner)
  var initial = (new URLSearchParams(location.search)).get("page") || "planner";
  document.getElementById("app").src = srcFor(initial);
  // the app posts here to switch pages without leaving the (banner-free) iframe
  window.addEventListener("message", function(e){
    var d = e.data;
    if (d && d.spnav) document.getElementById("app").src = srcFor(d.spnav);
  });
</script>
</body>
</html>
